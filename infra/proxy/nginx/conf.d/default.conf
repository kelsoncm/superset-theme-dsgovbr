# Configuração de Proxy Reverso do Nginx para o SupersetBR
# Cuidado: Não quebrar upstream. Leia AGENTS.md antes de mexer.

upstream superset_backend {
    server superset:8088;
}

server {
    listen 80;
    server_name localhost;

    # Cabeçalhos de Segurança (Requisito de Governança e CSP decentes)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Content Security Policy (CSP) alinhada ao Superset e fontes de terceiros
    # Permite fontes do google e cdnfonts usadas no tema dsgovbr
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.cdnfonts.com; img-src 'self' data: blob:; font-src 'self' https://fonts.gstatic.com https://fonts.cdnfonts.com; connect-src 'self'; frame-ancestors 'self' http://localhost:8000; frame-src 'self';" always;

    # Limite de tamanho de upload de arquivos (necessário para import de datasets/dashboards)
    client_max_body_size 100M;

    location / {
        proxy_pass http://superset_backend;
        
        # Cabeçalhos de Proxy
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # Configurações de timeouts para queries longas
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
        
        # Suporte a WebSockets (se o Superset utilizar no futuro)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Tratamento de Erros Customizados (opcional)
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
